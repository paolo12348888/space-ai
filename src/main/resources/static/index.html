<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SPACE AI 🌌</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a28;
    --border: #2a2a40;
    --accent: #7c6af7;
    --accent2: #a78bfa;
    --text: #e2e0ff;
    --text-muted: #6b6a8a;
    --user-bg: #1e1b3a;
    --ai-bg: #12121a;
    --success: #4ade80;
    --error: #f87171;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .logo { font-size: 1.4rem; }
  .title-block h1 { font-size: 1.1rem; font-weight: 700; color: var(--accent2); }
  .title-block p  { font-size: 0.75rem; color: var(--text-muted); margin-top: 1px; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--success);
    margin-left: auto;
    box-shadow: 0 0 6px var(--success);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; } 50% { opacity:.4; }
  }
  #model-badge {
    font-size: 0.7rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 20px;
    color: var(--text-muted);
  }

  /* Messages */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }
  .msg {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 14px;
    line-height: 1.6;
    font-size: 0.9rem;
    word-break: break-word;
    white-space: pre-wrap;
    animation: fadeIn .2s ease;
  }
  @keyframes fadeIn { from {opacity:0;transform:translateY(6px)} to {opacity:1;transform:none} }
  .msg.user {
    background: var(--user-bg);
    border: 1px solid var(--accent);
    align-self: flex-end;
    border-bottom-right-radius: 4px;
    color: var(--text);
  }
  .msg.ai {
    background: var(--ai-bg);
    border: 1px solid var(--border);
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }
  .msg.ai .sender { font-size: 0.72rem; color: var(--accent2); margin-bottom: 5px; font-weight: 600; }
  .msg.error { background: #2a1010; border-color: var(--error); color: var(--error); }

  /* Typing indicator */
  .typing { display: flex; align-items: center; gap: 5px; padding: 14px 18px; }
  .typing span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent); animation: bounce .9s infinite;
  }
  .typing span:nth-child(2) { animation-delay: .15s; }
  .typing span:nth-child(3) { animation-delay: .30s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-8px)} }

  /* Welcome */
  #welcome {
    margin: auto;
    text-align: center;
    color: var(--text-muted);
    padding: 40px 20px;
  }
  #welcome .big { font-size: 3rem; margin-bottom: 12px; }
  #welcome h2 { font-size: 1.3rem; color: var(--accent2); margin-bottom: 8px; }
  #welcome p  { font-size: 0.85rem; line-height: 1.7; max-width: 360px; margin: 0 auto; }
  .suggestions {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center; margin-top: 20px;
  }
  .suggestion {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: border-color .2s, color .2s;
    color: var(--text-muted);
  }
  .suggestion:hover { border-color: var(--accent); color: var(--text); }

  /* Input area */
  footer {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 14px 20px;
    flex-shrink: 0;
  }
  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    max-width: 900px;
    margin: 0 auto;
  }
  textarea {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 0.9rem;
    font-family: inherit;
    padding: 10px 14px;
    resize: none;
    min-height: 44px;
    max-height: 160px;
    outline: none;
    transition: border-color .2s;
    line-height: 1.5;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--text-muted); }
  button#send {
    background: var(--accent);
    border: none;
    border-radius: 12px;
    color: white;
    width: 44px; height: 44px;
    cursor: pointer;
    font-size: 1.1rem;
    transition: background .2s, transform .1s;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  button#send:hover  { background: var(--accent2); }
  button#send:active { transform: scale(.95); }
  button#send:disabled { background: var(--border); cursor: not-allowed; }
  .footer-hint { text-align: center; font-size: 0.7rem; color: var(--text-muted); margin-top: 8px; }
</style>
</head>
<body>

<header>
  <div class="logo">🌌</div>
  <div class="title-block">
    <h1>SPACE AI</h1>
    <p>Il tuo compagno di programmazione cosmico</p>
  </div>
  <span id="model-badge">caricamento...</span>
  <div class="status-dot" id="status-dot"></div>
</header>

<div id="messages">
  <div id="welcome">
    <div class="big">🚀</div>
    <h2>Benvenuto in SPACE AI</h2>
    <p>Sono il tuo assistente AI alimentato da DeepSeek via ModelScope. Chiedimi qualsiasi cosa!</p>
    <div class="suggestions">
      <div class="suggestion" onclick="send('Scrivi una funzione Python per leggere un CSV')">Python CSV</div>
      <div class="suggestion" onclick="send('Spiega cos\'è Docker in modo semplice')">Cos'è Docker?</div>
      <div class="suggestion" onclick="send('Crea un endpoint REST in Spring Boot')">Spring Boot REST</div>
      <div class="suggestion" onclick="send('Come funziona il fine-tuning di un LLM?')">Fine-tuning LLM</div>
    </div>
  </div>
</div>

<footer>
  <div class="input-row">
    <textarea id="input" placeholder="Scrivi un messaggio..." rows="1"></textarea>
    <button id="send" onclick="sendMessage()">➤</button>
  </div>
  <div class="footer-hint">Invio per inviare • Shift+Invio per andare a capo</div>
</footer>

<script>
const messagesDiv = document.getElementById('messages');
const inputEl     = document.getElementById('input');
const sendBtn     = document.getElementById('send');
const modelBadge  = document.getElementById('model-badge');
const statusDot   = document.getElementById('status-dot');

// Auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
});

// Enter to send, Shift+Enter for newline
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// Load health info
async function loadHealth() {
  try {
    const r = await fetch('/api/health');
    const d = await r.json();
    modelBadge.textContent = d.model || 'unknown';
    statusDot.style.background = '#4ade80';
  } catch {
    modelBadge.textContent = 'offline';
    statusDot.style.background = '#f87171';
    statusDot.style.boxShadow = '0 0 6px #f87171';
  }
}
loadHealth();

function send(text) {
  inputEl.value = text;
  sendMessage();
}

function removeWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.remove();
}

function addMessage(text, cls) {
  removeWelcome();
  const div = document.createElement('div');
  div.className = 'msg ' + cls;
  if (cls === 'ai') {
    div.innerHTML = '<div class="sender">🌌 SPACE AI</div>' + escapeHtml(text);
  } else {
    div.textContent = text;
  }
  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
  return div;
}

function addTyping() {
  removeWelcome();
  const div = document.createElement('div');
  div.className = 'msg ai typing';
  div.id = 'typing';
  div.innerHTML = '<span></span><span></span><span></span>';
  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || sendBtn.disabled) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;

  addMessage(text, 'user');
  addTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });
    const data = await res.json();
    removeTyping();
    if (data.error) {
      addMessage('❌ ' + data.error, 'ai error');
    } else {
      addMessage(data.response || '(risposta vuota)', 'ai');
    }
  } catch (err) {
    removeTyping();
    addMessage('❌ Errore di rete: ' + err.message, 'ai error');
  } finally {
    sendBtn.disabled = false;
    inputEl.focus();
  }
}
</script>
</body>
</html>
