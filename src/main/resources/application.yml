spring:
  ai:
    openai:
      api-key: ${AI_API_KEY:}
      base-url: ${AI_BASE_URL:https://api.groq.com/openai/v1}
      chat:
        options:
          model: ${AI_MODEL:llama-3.3-70b-versatile}

  main:
    web-application-type: servlet
    banner-mode: off

  threads:
    virtual:
      enabled: true

server:
  port: ${PORT:10000}

space-ai:
  provider: ${SPACE_AI_PROVIDER:openai}

logging:
  level:
    root: WARN
    com.spaceai: INFO
    org.springframework.web: INFO
