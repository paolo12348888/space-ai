spring:
  ai:
    openai:
      api-key: ${AI_API_KEY:}
      base-url: ${AI_BASE_URL:https://api.deepseek.com}
      chat:
        options:
          model: ${AI_MODEL:deepseek-chat}
          max-tokens: ${AI_MAX_TOKENS:8096}
          temperature: 0.7
    anthropic:
      api-key: ${AI_API_KEY:}
      base-url: ${AI_BASE_URL:https://api.anthropic.com}
      chat:
        options:
          model: ${AI_MODEL:claude-sonnet-4-20250514}
          max-tokens: ${AI_MAX_TOKENS:8096}
          temperature: 0.7

  main:
    web-application-type: servlet
    banner-mode: off

  threads:
    virtual:
      enabled: true

server:
  port: ${PORT:10000}

space-ai:
  provider: ${SPACE_AI_PROVIDER:openai}

logging:
  level:
    root: WARN
    com.spaceai: INFO
    org.springframework: WARN
    org.jline: WARN
