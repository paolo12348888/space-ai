spring:
  ai:
    # === Configurazione API compatibile OpenAI — DEFAULT: DeepSeek ===
    # Compatibile con DeepSeek, Qwen, GPT-4o, e qualsiasi API OpenAI-compatible
    # Imposta AI_BASE_URL per cambiare provider:
    #   DeepSeek:  https://api.deepseek.com
    #   Qwen:      https://dashscope.aliyuncs.com/compatible-mode/v1
    #   OpenAI:    https://api.openai.com
    #   ModelScope (tuo LLM): https://api-inference.modelscope.cn/v1
    openai:
      api-key: ${AI_API_KEY:}
      base-url: ${AI_BASE_URL:https://api.deepseek.com}
      chat:
        options:
          model: ${AI_MODEL:deepseek-chat}
          max-tokens: ${AI_MAX_TOKENS:8096}
          temperature: 0.7

    # === Configurazione API nativa Anthropic (opzionale) ===
    # Abilitare impostando space-ai.provider=anthropic
    anthropic:
      api-key: ${AI_API_KEY:}
      base-url: ${AI_BASE_URL:https://api.anthropic.com}
      chat:
        options:
          model: ${AI_MODEL:claude-sonnet-4-20250514}  # ID API Anthropic (usato solo se provider=anthropic)
          max-tokens: ${AI_MAX_TOKENS:8096}
          temperature: 0.7

  # Non avvia il server Web (modalità CLI pura)
  main:
    web-application-type: none
    banner-mode: off

  # thread virtuali
  threads:
    virtual:
      enabled: true

# === Configurazione personalizzata Space AI Java ===
space-ai:
  # Provider API: openai (default, compatibile DeepSeek/Qwen/ModelScope) o anthropic
  provider: ${SPACE_AI_PROVIDER:openai}

# Log: in modalità CLI mostra solo WARN e superiori, per mantenere la console pulita
logging:
  level:
    root: WARN
    com.spaceai: WARN
    org.springframework: WARN
    org.jline: WARN
