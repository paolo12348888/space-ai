# ─────────────────────────────────────────────────────────────
# SPACE AI — Configurazione Render
# Questo file configura automaticamente il servizio su Render
# ─────────────────────────────────────────────────────────────

services:
  - type: web
    name: space-ai
    runtime: docker
    region: frankfurt
    plan: free
    branch: main
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health

    # ── Variabili d'ambiente ──────────────────────────────────
    envVars:
      # Provider API (openai = compatibile con DeepSeek/Qwen/ModelScope)
      - key: SPACE_AI_PROVIDER
        value: openai

      # ModelScope come backend AI
      - key: AI_BASE_URL
        value: https://api-inference.modelscope.cn/v1

      # Modello DeepSeek-R1 su ModelScope
      - key: AI_MODEL
        value: deepseek-ai/DeepSeek-R1-Distill-Qwen-7B

      # API Key ModelScope — METTI IL TUO TOKEN QUI
      # oppure impostala manualmente in Render > Environment
      - key: AI_API_KEY
        sync: false   # Render chiederà di inserirla manualmente (sicuro)

      # Porta HTTP per Render
      - key: PORT
        value: "8080"

      # Memoria JVM ottimizzata per il piano Free (512MB)
      - key: JAVA_OPTS
        value: "-Xmx400m -Xms128m"
